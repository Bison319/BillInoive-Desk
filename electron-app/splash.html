<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; background: transparent;
      -webkit-app-region: drag;
      user-select: none;
    }
    .splash {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0d1233 100%);
      border-radius: 20px; padding: 50px 60px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,229,255,0.1);
      min-width: 440px;
      border: 1px solid rgba(0,229,255,0.2);
    }
    .logo { font-size: 48px; margin-bottom: 5px; }
    h1 { color: #00e5ff; font-size: 32px; font-weight: 700; margin-bottom: 4px; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
    .tagline { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 30px; }
    .progress-bar {
      width: 100%; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden; margin-bottom: 15px;
    }
    .progress-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #00e5ff, #7b2ff7, #00e5ff);
      border-radius: 2px;
      animation: loading 3s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 80%; }
      100% { width: 100%; }
    }
    .status { color: rgba(255,255,255,0.6); font-size: 12px; }
    .version { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">⬡</div>
    <h1>AVP Nexus</h1>
    <p class="tagline">Billing & Payment Platform</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <p class="status">Starting application...</p>
    <p class="version">v1.0.0</p>
  </div>
</body>
</html>
